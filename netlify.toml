[build]
  # The directory to publish (where index.html is located)
  publish = "."

  # No build command necessary for static HTML/JS/CSS apps
  command = "echo 'Deploying static frontend'"

[[redirects]]
  # This makes sure that paths get properly routed to index.html if you ever add client-side routing
  from = "/*"
  to = "/index.html"
  status = 200
